version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vielhome-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vielhome
      POSTGRES_PASSWORD: vielhome
      POSTGRES_DB: vielhome
    ports:
      - "5432:5432"
    volumes:
      - vielhome_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vielhome"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vielhome-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vielhome_postgres_data:
